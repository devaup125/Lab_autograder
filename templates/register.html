<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Programming Lab</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="centered">

<div class="card">

    <h2>🚀 Create Account</h2>
    <p style="text-align:center; margin-bottom:15px;">Join Programming Lab</p>

    <!-- 🔥 ERROR MESSAGE -->
    {% if error %}
        <p style="color:#ef4444; text-align:center; margin-bottom:10px;">
            {{ error }}
        </p>
    {% endif %}

    <!-- FORM -->
    <form method="post" action="{{ url_for('register') }}" onsubmit="return validateRegister()">

        <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="👤 Username"
            required
        >

        <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="🔒 Password"
            required
        >

        <!-- OPTIONAL CONFIRM PASSWORD -->
        <input 
            type="password" 
            id="confirm_password" 
            placeholder="🔒 Confirm Password"
            required
        >

        <button type="submit">Register</button>

    </form>

    <p style="text-align:center; margin-top:10px;">
        Already registered?
        <a href="{{ url_for('login') }}">Login</a>
    </p>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

<script>
function validateRegister() {
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirm_password").value;

    if (pass.length < 4) {
        alert("Password must be at least 4 characters");
        return false;
    }

    if (pass !== confirm) {
        alert("Passwords do not match ❌");
        return false;
    }

    return true;
}
</script>

</body>
</html>
