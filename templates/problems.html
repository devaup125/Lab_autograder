{% extends "base_student.html" %}
{% block content %}

<h3>Available Problems</h3>

<table>
<tr>
<th>ID</th>
<th>Title</th>
<th>Language</th>
<th>Action</th>
</tr>

{% for p in problems %}
<tr>
<td>{{p.id}}</td>
<td>{{p.title}}</td>
<td>{{p.language}}</td>
<td><a href="/problem/{{p.id}}">Attempt</a></td>
</tr>
{% endfor %}

</table>

{% endblock %}
