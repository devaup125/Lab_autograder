<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Programming Lab</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="centered">

<div class="card">

    <h2>Programming Lab</h2>
    <p style="text-align:center; margin-bottom:15px;">Login to continue</p>

    <!-- 🔥 FIX: action should match Flask route -->
    <form method="post" action="/" onsubmit="return validateLogin()">

        <input type="text" id="username" name="username" placeholder=" Username" required>

        <input type="password" id="password" name="password" placeholder="🔒 Password" required>

        <button type="submit">Login</button>

    </form>

    <p style="text-align:center; margin-top:10px;">
        Don't have an account?
        <a href="{{ url_for('register') }}">Register</a>
    </p>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
