{% extends "base_student.html" %}
{% block content %}

<h3>{{problem.title}}</h3>
<p>{{problem.description}}</p>

<div class="editor-container">

    <!-- LEFT SIDE -->
    <div class="editor-panel">

        <div class="editor-header">
            <span>💻 Code Editor</span>

            <select id="language">
                <option value="python">Python</option>
                <option value="c">C</option>
                <option value="cpp">C++</option>
            </select>
        </div>

        <div id="editor"></div>

        <button class="run-btn" onclick="submitCode()">▶ Submit Code</button>

    </div>

    <!-- RIGHT SIDE -->
    <div class="output-panel">

        <div class="output-header">🖥 Output</div>

        <pre id="output">Run your code to see output...</pre>

        <!-- RESULT INFO -->
        <div id="resultBox"></div>

        <!-- NAV BUTTONS -->
        <div class="nav-buttons">
            <a href="/scoreboard" class="btn"> Scoreboard</a>
            <a href="/history" class="btn">History</a>
        </div>

    </div>

</div>

<!-- MONACO EDITOR -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>

<script>
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' }});

require(['vs/editor/editor.main'], function () {
    window.editor = monaco.editor.create(document.getElementById('editor'), {
        value: "# Write your code here",
        language: "python",
        theme: "vs-dark",
        automaticLayout: true
    });
});

async function submitCode() {

    let code = editor.getValue();
    let lang = document.getElementById("language").value;

    document.getElementById("output").textContent = "Running...";
    document.getElementById("resultBox").innerHTML = "";

    let formData = new FormData();
    formData.append("code", code);
    formData.append("language", lang);

    let res = await fetch("/submit/{{problem.id}}", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    document.getElementById("output").textContent =
        data.error ? data.error : data.output;

    document.getElementById("resultBox").innerHTML = `
        <div class="result-box">
            <p>✅ Status: <b>${data.status}</b></p>
            <p>🏆 Score: <b>${data.score}</b></p>
            <p>⚠ Penalty: <b>${data.penalty}</b></p>
            <p>⏱ Time: <b>${data.time}s</b></p>
        </div>
    `;
}
</script>

{% endblock %}
